name: Trigger docs site rebuild

# The docs site (ethrxpresidente/ethrx-docs-site) bakes these MDX files into a
# static build via scripts/sync-docs.mjs. Vercel only auto-builds on pushes to
# that repo, so a push here must explicitly ping the site's Vercel deploy hook.
#
# Setup: in the ethrx-docs-site Vercel project, create a Deploy Hook
# (Settings → Git → Deploy Hooks, branch: main) and save its URL as the repo
# secret VERCEL_DEPLOY_HOOK_URL in this repository
# (Settings → Secrets and variables → Actions).

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Vercel deploy hook
        env:
          HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$HOOK_URL" ]; then
            echo "VERCEL_DEPLOY_HOOK_URL secret is not set — skipping. Add it to enable auto-deploys."
            exit 0
          fi
          echo "Triggering docs site rebuild..."
          code=$(curl -s -o /dev/null -w "%{http_code}" -X POST "$HOOK_URL")
          echo "Deploy hook responded with HTTP $code"
          case "$code" in
            2*) echo "Rebuild queued." ;;
            *) echo "Deploy hook failed (HTTP $code)"; exit 1 ;;
          esac
